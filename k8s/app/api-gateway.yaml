apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: app
data:
  CHECKLIST_SERVICE_URL: "http://checklist-service.app.svc.cluster.local:8000"
  RESULT_SERVICE_URL:    "http://result-service.app.svc.cluster.local:8001"
  SCAN_SERVICE_URL:      "http://scan-service.app.svc.cluster.local:8002"
  REPORT_SERVICE_URL:    "http://report-service.app.svc.cluster.local:8003"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: minyong1234/api-gateway:v1   # ← 수정
          ports:
            - containerPort: 8000
          env:
            - name: CHECKLIST_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: CHECKLIST_SERVICE_URL
            - name: RESULT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: RESULT_SERVICE_URL
            - name: SCAN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: SCAN_SERVICE_URL
            - name: REPORT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: REPORT_SERVICE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: app
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
