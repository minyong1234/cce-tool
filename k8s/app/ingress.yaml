apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cce-ingress
  namespace: app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # /api/checklists → /checklists 로 경로 변환
    traefik.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: checklist-service
                port:
                  number: 8000
