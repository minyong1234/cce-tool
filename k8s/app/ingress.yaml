apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cce-ingress
  namespace: app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # 모든 요청을 일단 checklist-service로 (테스트용)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: checklist-service
                port:
                  number: 8000
