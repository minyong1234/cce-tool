apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cce-ingress
  namespace: app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # API 요청은 api-gateway로
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          # 나머지는 frontend로
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
