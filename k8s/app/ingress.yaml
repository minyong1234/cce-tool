apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cce-ingress
  namespace: app
  annotations:
    # Traefik(k3s 기본 Ingress)에서 경로 prefix를 strip해서 서비스로 전달
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # checklist-service 라우팅
          - path: /api/checklists
            pathType: Prefix
            backend:
              service:
                name: checklist-service
                port:
                  number: 8000
          # 헬스체크 라우팅
          - path: /api/health
            pathType: Prefix
            backend:
              service:
                name: checklist-service
                port:
                  number: 8000
